{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة المؤسسة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    
    <style>
        :root {
            --primary-blue: #003366;
            --glass-sidebar: rgba(0, 51, 102, 0.85);
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d7e3ec 100%);
            --text-color: #333;
        }

        /* أنماط الثيم الليلي */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --text-color: #f7fafc;
        }
        body.dark-mode .glass-panel {
            background: rgba(45, 55, 72, 0.7);
            color: white;
        }
        body.dark-mode .main-content h2, body.dark-mode .main-content h3 { color: #FFD700; }

        /* ميزة وضع الخصوصية (تضبيب الأرقام) */
        .privacy-active .fw-bold, 
        .privacy-active .badge,
        .privacy-active h3.fw-bold {
            filter: blur(6px) !important;
            transition: 0.3s;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-color);
            transition: background 0.4s ease;
        }

        /* شريط أدوات المدير الجديد */
        .admin-toolbar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--primary-blue);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        body.dark-mode .tool-btn { color: #FFD700; }
        .tool-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        /* الأكواد الأصلية للـ Sidebar */
        .sidebar {
            width: 280px;
            background: var(--glass-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            position: fixed;
            top: 15px;
            right: 15px;
            bottom: 15px;
            border-radius: 25px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            z-index: 1000;
            padding-top: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        .logo-section img {
            width: 100px;
            border-radius: 20px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            margin: 5px 15px;
            border-radius: 15px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.2);
            color: #FFD700 !important;
            transform: translateX(-5px);
        }

        .main-content {
            flex: 1;
            margin-right: 310px;
            padding: 40px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body id="mainBody">

    <div class="admin-toolbar shadow-sm">
        <button class="tool-btn" onclick="toggleDarkMode()" title="الثيم الليلي">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="tool-btn" onclick="togglePrivacy()" title="وضع الخصوصية">
            <i class="fas fa-eye-slash" id="privacyIcon"></i>
        </button>
        <button class="tool-btn" onclick="startVoiceSearch()" title="البحث الصوتي">
            <i class="fas fa-microphone" id="micIcon"></i>
        </button>
        <form method="post" action="{% url 'logout' %}" class="m-0">
            {% csrf_token %}
            <button class="tool-btn" type="submit" title="تسجيل الخروج">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </form>
    </div>

    <aside class="sidebar">
        <div class="logo-section text-center mb-4">
            <img src="{% static 'img/image_740359.jpg' %}" alt="شعار">
            <h4 class="fw-bold">المؤسسة الرقمية</h4>
        </div>
        
        <nav class="nav-menu">
            <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-th-large"></i> لوحة التحكم
            </a>
            <a href="{% url 'projects_list' %}" class="nav-link {% if request.resolver_match.url_name == 'projects_list' %}active{% endif %}">
                <i class="fas fa-project-diagram"></i> إدارة المشاريع
            </a>
            <a href="{% url 'customer_orders' %}" class="nav-link {% if request.resolver_match.url_name == 'customer_orders' %}active{% endif %}">
                <i class="fas fa-shopping-cart"></i> الطلبات
            </a>
            <a href="{% url 'customers_list' %}" class="nav-link {% if request.resolver_match.url_name == 'customers_list' %}active{% endif %}">
                <i class="fas fa-user-friends"></i> إدارة الزبائن
            </a>
            <a href="{% url 'purchases_list' %}" class="nav-link {% if request.resolver_match.url_name == 'purchases_list' %}active{% endif %}">
                <i class="fas fa-shopping-basket"></i> قسم المشتريات
            </a>
            <a href="{% url 'finance_summary' %}" class="nav-link {% if request.resolver_match.url_name == 'finance_summary' %}active{% endif %}">
                <i class="fas fa-wallet"></i> الشؤون المالية
            </a>
            <a href="{% url 'hr_management' %}" class="nav-link {% if request.resolver_match.url_name == 'hr_management' %}active{% endif %}">
                <i class="fas fa-user-tie"></i> الموارد البشرية
            </a>
            <a href="{% url 'digital_archive' %}" class="nav-link {% if request.resolver_match.url_name == 'digital_archive' %}active{% endif %}">
                <i class="fas fa-archive"></i> الأرشيف الرقمي
            </a>
            <a href="{% url 'reports_view' %}" class="nav-link {% if request.resolver_match.url_name == 'reports_view' %}active{% endif %}">
                <i class="fas fa-chart-bar"></i> التقارير والإحصائيات
            </a>
        </nav>
    </aside>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 1. ميزة الثيم الليلي التلقائي
        function toggleDarkMode() {
            const body = document.getElementById('mainBody');
            const icon = document.getElementById('themeIcon');
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        // 2. ميزة وضع الخصوصية (تضبيب الأرقام المالية)
        function togglePrivacy() {
            const body = document.getElementById('mainBody');
            const icon = document.getElementById('privacyIcon');
            body.classList.toggle('privacy-active');
            
            const isPrivate = body.classList.contains('privacy-active');
            icon.className = isPrivate ? 'fas fa-eye' : 'fas fa-eye-slash';
            icon.style.color = isPrivate ? '#e74c3c' : '';
        }

        // 3. ميزة البحث الصوتي الذكي
        function startVoiceSearch() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-SA';
            const micIcon = document.getElementById('micIcon');
            
            recognition.onstart = () => {
                micIcon.style.color = '#e74c3c';
                micIcon.classList.add('fa-beat');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                // ابحث عن خانة البحث في الصفحة وضع فيها النص
                const searchInput = document.querySelector('input[type="text"]');
                if (searchInput) {
                    searchInput.value = transcript;
                    // تفعيل البحث اللحظي إذا كان موجوداً
                    searchInput.dispatchEvent(new Event('keyup'));
                }
            };

            recognition.onend = () => {
                micIcon.style.color = '';
                micIcon.classList.remove('fa-beat');
            };

            recognition.start();
        }

        // استعادة التفضيلات عند تحميل الصفحة
        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.getElementById('mainBody').classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        };
    </script>
</body>
</html>
