{% extends 'base.html' %}
{% block content %}

<style>
    .edit-container {
        max-width: 800px;
        margin: 40px auto;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        border: 1px solid rgba(255,255,255,0.4);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { 
        display: block; 
        margin-bottom: 8px; 
        color: #1e3a8a; 
        font-weight: bold; 
        font-size: 0.9rem; 
    }
    .form-control { 
        width: 100%; 
        padding: 12px; 
        border-radius: 12px; 
        border: 1px solid #cbd5e1; 
        background: white; 
        font-family: inherit;
        transition: 0.3s;
    }
    .form-control:focus {
        border-color: #1e3a8a;
        box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
        outline: none;
    }
    .btn-save {
        background: #1e3a8a;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: 0.3s;
        width: 100%;
    }
    .btn-save:hover { background: #172e6d; transform: translateY(-2px); }
    .btn-cancel {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #64748b;
        text-decoration: none;
        font-size: 0.9rem;
    }
</style>

<div class="edit-container">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fas fa-edit fa-3x" style="color: #1e3a8a; margin-bottom: 15px;"></i>
        <h2 style="color: #1e3a8a; margin: 0;">تعديل بيانات المهمة</h2>
        <p style="color: #64748b;">تحديث بيانات الطلب الخاص بـ: <strong>{{ order.manual_customer_name }}</strong></p>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>اسم الجهة / الزبون</label>
                <input type="text" name="manual_customer_name" class="form-control" value="{{ order.manual_customer_name }}" required>
            </div>
            <div class="form-group">
                <label>عنوان المهمة</label>
                <input type="text" name="title" class="form-control" value="{{ order.title }}" required>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>الصنف / التصنيف</label>
                <input type="text" name="item_name" class="form-control" value="{{ order.item_name }}" required>
            </div>
            <div class="form-group">
                <label>الميزانية (د.ل)</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ order.price }}">
            </div>
        </div>

        <div class="form-group">
            <label>توصيف العمل</label>
            <textarea name="description" class="form-control" rows="4">{{ order.description }}</textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>موعد التسليم</label>
                <input type="date" name="deadline" class="form-control" value="{{ order.deadline|date:'Y-m-d' }}">
            </div>
            <div class="form-group">
                <label>تحديث المرفقات</label>
                <input type="file" name="attachments" class="form-control">
                {% if order.attachments %}
                    <small style="color: #059669;">يوجد ملف حالي: <a href="{{ order.attachments.url }}" target="_blank">عرض</a></small>
                {% endif %}
            </div>
        </div>

        <button type="submit" class="btn-save">حفظ التغييرات</button>
        <a href="{% url 'customer_orders' %}" class="btn-cancel">إلغاء والعودة للقائمة</a>
    </form>
</div>

{% endblock %}
